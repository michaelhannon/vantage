<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VANTAGE — Prediction Markets</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;color:#ddddf0;font-family:'Syne',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#07070f}::-webkit-scrollbar-thumb{background:#252540;border-radius:2px}
input,button,textarea,select{font-family:'Syne',sans-serif;cursor:pointer}
input:focus,textarea:focus,select:focus{outline:none}
.card{background:#0e0e1c;border:1px solid #1a1a2e;border-radius:12px;padding:18px;transition:border-color .2s,transform .2s}
.card:hover{border-color:#2a2a48;transform:translateY(-1px)}
.yes-btn{background:transparent;border:1px solid #00e87a44;color:#00e87a;border-radius:6px;padding:8px 0;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:.05em;transition:all .15s;flex:1}
.yes-btn:hover{background:#00e87a;color:#07070f}
.no-btn{background:transparent;border:1px solid #ff335544;color:#ff3355;border-radius:6px;padding:8px 0;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:.05em;transition:all .15s;flex:1}
.no-btn:hover{background:#ff3355;color:#fff}
.resolve-btn{background:transparent;border:1px solid #252540;color:#5a5a80;border-radius:6px;padding:8px 10px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap}
.resolve-btn:hover{border-color:#3a3a60;color:#9090b0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#4a4a6a;padding:12px 14px;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.04em;margin-bottom:-1px;transition:all .15s}
.tab.active{color:#ddddf0;border-bottom-color:#00e87a}
.filter-btn{background:transparent;border:1px solid #1a1a2e;border-radius:6px;color:#4a4a6a;padding:5px 12px;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.04em;transition:all .15s}
.filter-btn.active{background:#1a1a2e;color:#ddddf0;border-color:#2a2a48}
.gen-btn{background:linear-gradient(135deg,#001510,#002018);border:1px solid #00e87a44;border-radius:8px;color:#00e87a;padding:8px 14px;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.04em;transition:all .15s}
.gen-btn:hover{border-color:#00e87a88}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.create-btn{background:linear-gradient(135deg,#100008,#1e0012);border:1px solid #b040ff44;border-radius:8px;color:#b040ff;padding:8px 14px;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.04em;transition:all .15s}
.create-btn:hover{border-color:#b040ff88}
.confirm-yes{width:100%;padding:13px;border-radius:10px;border:none;background:#00e87a;color:#07070f;font-size:14px;font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.04em;transition:opacity .15s}
.confirm-no{width:100%;padding:13px;border-radius:10px;border:none;background:#ff3355;color:#fff;font-size:14px;font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.04em;transition:opacity .15s}
.confirm-yes:hover,.confirm-no:hover{opacity:.88}
@keyframes slideDown{from{transform:translateY(-6px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.notif{position:fixed;top:68px;right:20px;padding:10px 18px;border-radius:8px;font-size:12px;font-family:'DM Mono',monospace;z-index:9999;animation:slideDown .2s ease;border:1px solid;pointer-events:none}
.notif.ok{background:#091a10;border-color:#00e87a;color:#00e87a}
.notif.err{background:#1a0810;border-color:#ff3355;color:#ff3355}
.modal-overlay{position:fixed;inset:0;background:rgba(7,7,15,.92);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .15s ease;padding:16px}
.modal{background:#11111e;border:1px solid #2a2a48;border-radius:16px;padding:24px;width:100%;max-width:440px;animation:slideDown .2s ease;max-height:90vh;overflow-y:auto}
.bet-input{background:#07070f;border:1px solid #2a2a48;border-radius:8px;color:#ddddf0;padding:12px 16px;font-size:18px;font-family:'DM Mono',monospace;width:100%}
.quick{flex:1;padding:6px 4px;background:#0e0e1c;border:1px solid #1a1a2e;border-radius:6px;color:#7070a0;font-size:12px;font-family:'DM Mono',monospace;transition:all .15s}
.quick:hover{color:#ddddf0;border-color:#2a2a48}
.field-input{background:#0e0e1c;border:1px solid #2a2a48;border-radius:8px;color:#ddddf0;padding:9px 14px;font-size:13px;width:100%;transition:border-color .15s}
.field-input:focus{border-color:#b040ff66}
.field-label{color:#4a4a6a;font-size:10px;letter-spacing:.1em;margin-bottom:6px;display:block}
.lb-row{display:flex;align-items:center;padding:10px 14px;border-radius:8px;margin-bottom:6px;background:#0e0e1c;border:1px solid #1a1a2e;animation:countUp .3s ease both}
.lb-row.me{border-color:#00e87a44;background:#071510}
.range-inp{width:100%;accent-color:#b040ff}
.select-inp{background:#0e0e1c;border:1px solid #2a2a48;border-radius:8px;color:#ddddf0;padding:9px 14px;font-size:13px;width:100%;transition:border-color .15s;appearance:none}
.select-inp:focus{border-color:#b040ff66}
.auth-input{background:#07070f;border:1px solid #2a2a48;border-radius:8px;color:#ddddf0;padding:11px 14px;font-size:14px;width:100%;transition:border-color .15s}
.auth-input:focus{border-color:#00e87a66}
.auth-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#00e87a;color:#07070f;font-size:14px;font-family:'Syne',sans-serif;font-weight:800;transition:opacity .15s}
.auth-btn:hover{opacity:.88}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
</style>

// ── Persistent storage (localStorage for standalone file) ────────────────────
const store={
  get:key=>{try{const v=localStorage.getItem(key);return v?{value:v}:null;}catch{return null;}},
  set:(key,val)=>{try{localStorage.setItem(key,val);return true;}catch{return false;}},
};

const claude=async(messages,system="")=>{
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,messages};
  if(system) body.system=system;
  const r=await fetch(`${PROXY_BASE}/api/anthropic/messages`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
  return d.content?.[0]?.text||"";
};

function Badge({cat}){

function Sparkline({data,color}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'line',
      data:{labels:data.map((_,i)=>i),datasets:[{data,borderColor:color,borderWidth:2,pointRadius:0,fill:true,backgroundColor:color+'18',tension:.4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:600}}
    });
    return()=>chartRef.current?.destroy();
  },[data]);
  return<canvas ref={ref} style={{height:48,width:'100%'}}/>;
}

function OddsChart({market}){
  const ref=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(chartRef.current) chartRef.current.destroy();
    const labels=market.history.map((_,i)=>`T-${market.history.length-1-i}`);
    labels[labels.length-1]='Now';
    chartRef.current=new Chart(ref.current,{
      type:'line',
      data:{labels,datasets:[
        {label:'YES %',data:market.history,borderColor:'#00e87a',borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#00e87a',fill:true,backgroundColor:'#00e87a12',tension:.4},
        {label:'NO %',data:market.history.map(v=>100-v),borderColor:'#ff3355',borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#ff3355',fill:true,backgroundColor:'#ff335512',tension:.4}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#5a5a80',font:{size:11,family:'DM Mono'}}},tooltip:{backgroundColor:'#11111e',borderColor:'#2a2a48',borderWidth:1,titleColor:'#ddddf0',bodyColor:'#8888aa',titleFont:{family:'Syne',size:12},bodyFont:{family:'DM Mono',size:11},callbacks:{label:c=>`${c.dataset.label}: ${c.raw}¢`}}},
        scales:{x:{ticks:{color:'#3a3a60',font:{family:'DM Mono',size:11}},grid:{color:'#131328'}},y:{min:0,max:100,ticks:{color:'#3a3a60',font:{family:'DM Mono',size:11},callback:v=>`${v}¢`},grid:{color:'#131328'}}},
        animation:{duration:800}
      }
    });
    return()=>chartRef.current?.destroy();
  },[market]);
  return<div style={{height:200,position:'relative'}}><canvas ref={ref}/></div>;
}

function AuthScreen({onAuth}){
  const [mode,setMode]=useState('login');
  const [name,setName]=useState('');
  const [user,setUser]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    if(!user.trim()||!pass.trim()){setErr('Fill in all fields');return;}
    if(mode==='register'&&!name.trim()){setErr('Enter a display name');return;}
    setLoading(true);setErr('');
    try{
      const r=store.get('vantage_users');
      let users={};
      if(r) users=JSON.parse(r.value);
      if(mode==='register'){
        if(users[user]){setErr('Username taken');setLoading(false);return;}
        users[user]={name:name||user,pass,balance:1000,totalPnl:0,bets:0,wins:0};
        store.set('vantage_users',JSON.stringify(users));
        onAuth({username:user,...users[user]});
      } else {
        // Check admin credentials first
        if(user===ADMIN_USER&&pass===ADMIN_PASS){
          onAuth({username:ADMIN_USER,name:'Admin',balance:0,bets:0,wins:0,isAdmin:true});
          setLoading(false);return;
        }
        if(!users[user]||users[user].pass!==pass){setErr('Invalid credentials');setLoading(false);return;}
        onAuth({username:user,...users[user]});
      }
    }catch(e){setErr('Storage error — try again');}
    setLoading(false);
  };

  return<div style={{maxWidth:380,margin:'60px auto',padding:20}}>
    <div style={{textAlign:'center',marginBottom:32}}>
      <div style={{color:'#00e87a',fontSize:32,marginBottom:8}}>◈</div>
      <div style={{fontWeight:800,fontSize:22,letterSpacing:'.14em'}}>VANTAGE</div>
      <div style={{color:'#3a3a60',fontSize:10,letterSpacing:'.14em',marginTop:2}}>PREDICTION MARKETS</div>
    </div>
    <div className="modal" style={{margin:0,maxWidth:'100%'}}>
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['login','register'].map(m=><button key={m} onClick={()=>{setMode(m);setErr('');}} style={{flex:1,padding:'9px',borderRadius:8,border:`1px solid ${mode===m?'#00e87a44':'#1a1a2e'}`,background:mode===m?'#071510':'transparent',color:mode===m?'#00e87a':'#4a4a6a',fontFamily:'Syne',fontWeight:700,fontSize:12,letterSpacing:'.06em',transition:'all .15s'}}>{m==='login'?'Sign In':'Register'}</button>)}
      </div>
      {mode==='register'&&<div style={{marginBottom:12}}>
        <label className="field-label">DISPLAY NAME</label>
        <input className="auth-input" placeholder="e.g. SharpBettor99" value={name} onChange={e=>setName(e.target.value)}/>
      </div>}
      <div style={{marginBottom:12}}>
        <label className="field-label">USERNAME</label>
        <input className="auth-input" placeholder="username" value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      <div style={{marginBottom:16}}>
        <label className="field-label">PASSWORD</label>
        <input className="auth-input" type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      {err&&<div style={{color:'#ff3355',fontSize:12,fontFamily:'DM Mono',marginBottom:12}}>{err}</div>}
      <button className="auth-btn" onClick={submit} disabled={loading}>
        {loading?<span style={{animation:'pulse 1s infinite'}}>...</span>:mode==='login'?'Sign In →':'Create Account →'}
      </button>
      <p style={{textAlign:'center',color:'#3a3a60',fontSize:11,marginTop:12}}>Try demo: <span style={{fontFamily:'DM Mono',color:'#00e87a'}}>demo</span> / <span style={{fontFamily:'DM Mono',color:'#00e87a'}}>demo</span> — or register your own account</p>
    </div>
  </div>;
}

function Leaderboard({currentUser}){
  const [board,setBoard]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    try{
      const r=store.get('vantage_users');
      if(r){
        const users=JSON.parse(r.value);
        const rows=Object.entries(users).map(([un,u])=>({username:un,name:u.name||un,balance:u.balance||1000,pnl:((u.balance||1000)-1000),bets:u.bets||0,wins:u.wins||0}));
        rows.sort((a,b)=>b.balance-a.balance);
        setBoard(rows);
      }
    }catch(e){setBoard([]);}
    setLoading(false);
  },[currentUser?.balance]);

  const medals=['🥇','🥈','🥉'];
  if(loading) return<div style={{color:'#3a3a60',textAlign:'center',padding:40,fontFamily:'DM Mono',fontSize:13}}>Loading leaderboard…</div>;
  if(!board.length) return<div style={{color:'#2a2a48',textAlign:'center',padding:60,fontSize:14}}>No players yet — register to appear here!</div>;

  return<>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
      {[['PLAYERS',board.length],['AVG BALANCE',`$${Math.round(board.reduce((s,r)=>s+r.balance,0)/board.length).toLocaleString()}`],['TOTAL BETS',board.reduce((s,r)=>s+r.bets,0)]].map(([l,v])=>(
        <div key={l} style={{background:'#0e0e1c',border:'1px solid #1a1a2e',borderRadius:8,padding:'12px 14px',textAlign:'center'}}>
          <div style={{color:'#3a3a60',fontSize:10,letterSpacing:'.1em',marginBottom:4}}>{l}</div>
          <div style={{fontFamily:'DM Mono',fontSize:16,fontWeight:500}}>{v}</div>
        </div>
      ))}
    </div>
    {board.map((row,i)=>{
      const isMe=row.username===currentUser?.username;
      const pnlClr=row.pnl>=0?'#00e87a':'#ff3355';
      return<div key={row.username} className={`lb-row${isMe?' me':''}`} style={{animationDelay:`${i*60}ms`}}>
        <div style={{width:32,textAlign:'center',fontSize:i<3?16:13,color:i<3?'#ddddf0':'#3a3a60',fontFamily:'DM Mono',fontWeight:500}}>{i<3?medals[i]:i+1}</div>
        <div style={{width:34,height:34,borderRadius:'50%',background:isMe?'#071510':'#131328',border:`1px solid ${isMe?'#00e87a33':'#1a1a2e'}`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,color:isMe?'#00e87a':'#5a5a80',marginRight:12,flexShrink:0}}>{row.name.substring(0,2).toUpperCase()}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:isMe?'#ddddf0':'#aaaacc'}}>{row.name}{isMe&&<span style={{color:'#00e87a',fontSize:10,marginLeft:8}}>YOU</span>}</div>
          <div style={{color:'#3a3a60',fontSize:11,fontFamily:'DM Mono'}}>{row.bets} bets · {row.wins} wins</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontFamily:'DM Mono',fontWeight:500,fontSize:15}}>${row.balance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          <div style={{fontFamily:'DM Mono',fontSize:11,color:pnlClr}}>{row.pnl>=0?'+':''}{row.pnl.toFixed(2)}</div>
        </div>
      </div>;
    })}
  </>;
}

function AdminPanel({markets,setMarkets,onResolve,resolvingId}){
  const [users,setUsers]=useState({});
  const [editBal,setEditBal]=useState({});
  const [editPass,setEditPass]=useState({});
  const [msg,setMsg]=useState('');

  useEffect(()=>{
    try{const r=store.get('vantage_users');if(r) setUsers(JSON.parse(r.value));}catch(e){}
  },[]);

  const saveUsers=u=>{
    store.set('vantage_users',JSON.stringify(u));
    setUsers({...u});
  };

  const adjustBalance=(un,amt)=>{
    const a=parseFloat(amt);if(isNaN(a)) return;
    const u={...users};u[un]={...u[un],balance:Math.max(0,parseFloat(((u[un].balance||0)+a).toFixed(2)))};
    saveUsers(u);setMsg(`Updated ${un} balance`);setTimeout(()=>setMsg(''),2000);
  };

  const resetPass=(un,np)=>{
    if(!np.trim()) return;
    const u={...users};u[un]={...u[un],pass:np};
    saveUsers(u);setEditPass(p=>({...p,[un]:''}));setMsg(`Reset ${un} password`);setTimeout(()=>setMsg(''),2000);
  };

  const deleteUser=un=>{
    const u={...users};delete u[un];
    saveUsers(u);setMsg(`Deleted ${un}`);setTimeout(()=>setMsg(''),2000);
  };

  const deleteMarket=id=>{
    setMarkets(prev=>prev.filter(m=>m.id!==id));
    setMsg('Market deleted');setTimeout(()=>setMsg(''),2000);
  };

  const totalVol=markets.reduce((s,m)=>s+m.vol,0);
  const totalUsers=Object.keys(users).length;
  const totalBets=Object.values(users).reduce((s,u)=>s+(u.bets||0),0);
  const totalBalance=Object.values(users).reduce((s,u)=>s+(u.balance||0),0);

  return<>
    {msg&&<div style={{background:'#071510',border:'1px solid #00e87a44',borderRadius:8,padding:'8px 14px',marginBottom:16,color:'#00e87a',fontFamily:'DM Mono',fontSize:12}}>{msg}</div>}

    {/* Platform Stats */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:24}}>
      {[['USERS',totalUsers,'#b040ff'],['TOTAL BETS',totalBets,'#4aa8ff'],['MARKET VOL',`$${(totalVol/1000).toFixed(0)}K`,'#f0c040'],['PLAYER FUNDS',`$${totalBalance.toFixed(0)}`,'#00e87a'],['OPEN MARKETS',markets.filter(m=>m.status==='open').length,'#30d8c0'],['RESOLVED',markets.filter(m=>m.status==='resolved').length,'#5a5a80']].map(([l,v,c])=>(
        <div key={l} style={{background:'#0e0e1c',border:'1px solid #1a1a2e',borderRadius:8,padding:'12px',textAlign:'center'}}>
          <div style={{color:'#3a3a60',fontSize:9,letterSpacing:'.1em',marginBottom:4}}>{l}</div>
          <div style={{fontFamily:'DM Mono',fontSize:15,fontWeight:500,color:c}}>{v}</div>
        </div>
      ))}
    </div>

    {/* User Management */}
    <div style={{marginBottom:24}}>
      <div style={{color:'#b040ff',fontSize:11,letterSpacing:'.1em',fontWeight:700,marginBottom:12}}>USER MANAGEMENT</div>
      {Object.keys(users).length===0?<div style={{color:'#2a2a48',fontSize:13}}>No users yet.</div>:
      Object.entries(users).map(([un,u])=>(
        <div key={un} style={{background:'#0e0e1c',border:'1px solid #1a1a2e',borderRadius:10,padding:'12px 14px',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
            <div>
              <span style={{fontWeight:700,fontSize:13}}>{u.name||un}</span>
              <span style={{fontFamily:'DM Mono',color:'#4a4a6a',fontSize:11,marginLeft:8}}>@{un}</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontFamily:'DM Mono',color:'#00e87a',fontSize:13}}>${(u.balance||0).toFixed(2)}</span>
              <span style={{color:'#3a3a60',fontSize:11}}>{u.bets||0} bets · {u.wins||0} wins</span>
            </div>
          </div>
          <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
            <input placeholder="Adjust $" value={editBal[un]||''} onChange={e=>setEditBal(b=>({...b,[un]:e.target.value}))} style={{background:'#07070f',border:'1px solid #2a2a48',borderRadius:6,color:'#ddddf0',padding:'5px 10px',fontSize:12,fontFamily:'DM Mono',width:90}}/>
            <button onClick={()=>adjustBalance(un,editBal[un]||'0')} style={{background:'transparent',border:'1px solid #00e87a44',borderRadius:6,color:'#00e87a',padding:'5px 10px',fontSize:11,fontFamily:'Syne',fontWeight:700}}>Apply</button>
            <input placeholder="New password" type="password" value={editPass[un]||''} onChange={e=>setEditPass(p=>({...p,[un]:e.target.value}))} style={{background:'#07070f',border:'1px solid #2a2a48',borderRadius:6,color:'#ddddf0',padding:'5px 10px',fontSize:12,fontFamily:'DM Mono',width:120}}/>
            <button onClick={()=>resetPass(un,editPass[un]||'')} style={{background:'transparent',border:'1px solid #4aa8ff44',borderRadius:6,color:'#4aa8ff',padding:'5px 10px',fontSize:11,fontFamily:'Syne',fontWeight:700}}>Reset Pass</button>
            <button onClick={()=>{if(window.confirm(`Delete user ${un}?`)) deleteUser(un);}} style={{background:'transparent',border:'1px solid #ff335544',borderRadius:6,color:'#ff3355',padding:'5px 10px',fontSize:11,fontFamily:'Syne',fontWeight:700}}>Delete</button>
          </div>
        </div>
      ))}
    </div>

    {/* Market Management */}
    <div>
      <div style={{color:'#b040ff',fontSize:11,letterSpacing:'.1em',fontWeight:700,marginBottom:12}}>MARKET MANAGEMENT</div>
      {markets.map(m=>(
        <div key={m.id} style={{background:'#0e0e1c',border:'1px solid #1a1a2e',borderRadius:10,padding:'12px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{marginBottom:4}}><Badge cat={m.category}/><span style={{marginLeft:8,fontSize:10,fontFamily:'DM Mono',color:m.status==='open'?'#00e87a':'#5a5a80'}}>{m.status.toUpperCase()}</span></div>
            <p style={{fontSize:12,lineHeight:1.4,fontWeight:600}}>{m.title}</p>
          </div>
          <div style={{display:'flex',gap:6}}>
            {m.status==='open'&&<button onClick={()=>onResolve(m)} disabled={resolvingId===m.id} style={{background:'transparent',border:'1px solid #f0c04044',borderRadius:6,color:'#f0c040',padding:'6px 10px',fontSize:11,fontFamily:'Syne',fontWeight:700}}>{resolvingId===m.id?'…':'⚡ Resolve'}</button>}
            <button onClick={()=>{if(window.confirm('Delete this market?')) deleteMarket(m.id);}} style={{background:'transparent',border:'1px solid #ff335544',borderRadius:6,color:'#ff3355',padding:'6px 10px',fontSize:11,fontFamily:'Syne',fontWeight:700}}>Delete</button>
          </div>
        </div>
      ))}
    </div>
  </>;
}

function App(){
  const [user,setUser]=useState(null);
  const [markets,setMarkets]=useState(INIT_MARKETS);
  const [cat,setCat]=useState("All");
  const [tab,setTab]=useState("markets");
  const [betModal,setBetModal]=useState(null);
  const [chartModal,setChartModal]=useState(null);
  const [betAmt,setBetAmt]=useState("50");
  const [betSide,setBetSide]=useState("YES");
  const [generating,setGenerating]=useState(false);
  const [resolvingId,setResolvingId]=useState(null);
  const [resolved,setResolved]=useState({});
  const [showCreate,setShowCreate]=useState(false);
  const [notif,setNotif]=useState(null);
  const [positions,setPositions]=useState({});
  const notifTimer=useRef(null);

  // Seed demo account on first load
  useEffect(()=>{
    try{
      const r=store.get("vantage_users");let us={};if(r) us=JSON.parse(r.value);
      if(!us.demo){us.demo={name:"Demo Player",pass:"demo",balance:2340.50,bets:18,wins:11,totalPnl:340.50};store.set("vantage_users",JSON.stringify(us));}
    }catch(e){}
  },[]);

  const notify=(msg,type="ok")=>{
    if(notifTimer.current) clearTimeout(notifTimer.current);
    setNotif({msg,type});
    notifTimer.current=setTimeout(()=>setNotif(null),3200);
  };

  const saveUser=u=>{
    try{
      const r=store.get('vantage_users');
      let users={};if(r) users=JSON.parse(r.value);
      users[u.username]={name:u.name,pass:users[u.username]?.pass||'',balance:u.balance,bets:u.bets||0,wins:u.wins||0,totalPnl:u.totalPnl||0};
      store.set('vantage_users',JSON.stringify(users));
    }catch(e){}
  };

  const handleAuth=u=>{
    // Seed demo account if missing
    try{
      const r=store.get('vantage_users');let us={};if(r) us=JSON.parse(r.value);
      if(!us.demo){us.demo={name:'Demo Player',pass:'demo',balance:2340.50,bets:18,wins:11,totalPnl:340.50};store.set('vantage_users',JSON.stringify(us));}
    }catch(e){}
    setUser(u);
  };

  const openBet=(market,side)=>{setBetModal(market);setBetSide(side);setBetAmt("50");};

  const placeBet=()=>{
    if(!betModal||!user) return;
    const amt=parseFloat(betAmt);
    if(!amt||amt<=0){notify("Enter a valid amount","err");return;}
    if(amt>user.balance){notify("Insufficient balance","err");return;}
    const price=betSide==="YES"?betModal.yp:100-betModal.yp;
    const shares=(amt/(price/100));
    const nu={...user,balance:parseFloat((user.balance-amt).toFixed(2)),bets:(user.bets||0)+1};
    setUser(nu);saveUser(nu);
    setPositions(prev=>{
      const k=betModal.id;const ex=prev[k];
      if(ex&&ex.side===betSide){
        const ns=ex.shares+shares;
        const nap=((ex.avgPrice*ex.shares)+(price*shares))/ns;
        return{...prev,[k]:{side:betSide,shares:ns,avgPrice:nap,invested:(ex.invested||0)+amt}};
      }
      return{...prev,[k]:{side:betSide,shares,avgPrice:price,invested:amt}};
    });
    setMarkets(prev=>prev.map(m=>{
      if(m.id!==betModal.id) return m;
      const d=Math.round(Math.random()*2)+1;
      const ny=betSide==="YES"?Math.min(95,m.yp+d):Math.max(5,m.yp-d);
      const nh=[...(m.history||[m.yp]),ny].slice(-12);
      return{...m,yp:ny,vol:m.vol+amt,history:nh};
    }));
    setBetModal(null);
    notify(`${shares.toFixed(1)} ${betSide} shares @ ${price}¢`);
  };

  const resolveMarket=async(market)=>{
    setResolvingId(market.id);
    try{
      const txt=await claude([{role:"user",content:`Resolve this prediction market as of March 14, 2026: "${market.title}"\nReturn ONLY JSON: {"outcome":"YES" or "NO" or "N/A","reasoning":"1-2 sentences","confidence":"high|medium|low"}`}]);
      const result=JSON.parse(txt.replace(/```json|```/g,"").trim());
      const pos=positions[market.id];
      if(pos&&result.outcome!=="N/A"){
        if(pos.side===result.outcome){
          const payout=pos.shares;
          const nu={...user,balance:parseFloat((user.balance+payout).toFixed(2)),wins:(user.wins||0)+1};
          setUser(nu);saveUser(nu);
          notify(`Resolved ${result.outcome} — you won $${payout.toFixed(2)}!`);
        } else {
          saveUser(user);
          notify(`Resolved ${result.outcome} — better luck next time.`,"err");
        }
        setPositions(prev=>{const n={...prev};delete n[market.id];return n;});
      } else {notify(`Market resolved: ${result.outcome}`);}
      setResolved(prev=>({...prev,[market.id]:result}));
      setMarkets(prev=>prev.map(m=>m.id===market.id?{...m,status:"resolved"}:m));
    }catch(e){console.error(e);notify("Resolution failed — check API key","err");}
    setResolvingId(null);
  };

  const aiGenerate=async()=>{
    setGenerating(true);
    try{
      const txt=await claude([{role:"user",content:`Generate 3 interesting, resolvable prediction markets for 2026. Mix categories. Return ONLY JSON array (no markdown):\n[{"title":"...","category":"Sports|Politics|Pop Culture|Custom","yesPrice":45,"closeDate":"Mon Year","volume":50000}]`}]);
      const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setMarkets(prev=>[...arr.map(m=>({id:NID++,title:m.title,category:m.category,yp:m.yesPrice,vol:m.volume,close:m.closeDate,status:"open",history:[m.yesPrice]})),...prev]);
      notify(`${arr.length} new markets added!`);
    }catch(e){notify("Generation failed — check API key","err");}
    setGenerating(false);
  };

  const filtered=cat==="All"?markets.filter(m=>m.status==="open"):markets.filter(m=>m.category===cat&&m.status==="open");
  const myPos=Object.entries(positions).map(([id,p])=>{const m=markets.find(x=>x.id===Number(id));return m?{...p,market:m}:null}).filter(Boolean);
  const resolvedList=markets.filter(m=>m.status==="resolved");

  if(!user) return<AuthScreen onAuth={handleAuth}/>;

  return<>
    {notif&&<div className={`notif ${notif.type}`}>{notif.msg}</div>}
    {showCreate&&<CreateMarketModal onClose={()=>setShowCreate(false)} onCreated={m=>{setMarkets(prev=>[m,...prev]);notify(`Market created!`);}}/>}

    {chartModal&&<div className="modal-overlay" onClick={()=>setChartModal(null)}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <Badge cat={chartModal.category}/>
          <button onClick={()=>setChartModal(null)} style={{background:'none',border:'none',color:'#4a4a6a',fontSize:18}}>✕</button>
        </div>
        <p style={{fontSize:13,fontWeight:600,lineHeight:1.5,marginBottom:16,color:'#ddddf0'}}>{chartModal.title}</p>
        <OddsChart market={chartModal}/>
        <div style={{display:'flex',gap:6,marginTop:16}}>
          <button className="yes-btn" onClick={()=>{setChartModal(null);openBet(chartModal,'YES');}}>BET YES</button>
          <button className="no-btn" onClick={()=>{setChartModal(null);openBet(chartModal,'NO');}}>BET NO</button>
        </div>
      </div>
    </div>}

    {/* HEADER */}
    <div style={{borderBottom:'1px solid #131328',padding:'0 16px',height:54,display:'flex',alignItems:'center',position:'sticky',top:0,background:'#07070f',zIndex:50}}>
      <div style={{maxWidth:1100,width:'100%',margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{color:'#00e87a',fontSize:18}}>◈</div>
          <div>
            <div style={{fontWeight:800,fontSize:13,letterSpacing:'.14em'}}>VANTAGE</div>
            <div style={{fontSize:8,letterSpacing:'.1em',color:'#252540'}}>PREDICTION MARKETS</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{textAlign:'right'}}>
            {user.isAdmin?<div style={{color:'#b040ff',fontFamily:'DM Mono',fontWeight:700,fontSize:12,letterSpacing:'.08em'}}>ADMIN</div>:<><div style={{color:'#3a3a60',fontSize:9,letterSpacing:'.1em'}}>BALANCE</div><div style={{color:'#00e87a',fontFamily:'DM Mono',fontWeight:500,fontSize:14}}>${user.balance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></>}
          </div>
          <div style={{width:32,height:32,borderRadius:'50%',background:user.isAdmin?'#12001e':'#071510',border:`1px solid ${user.isAdmin?'#b040ff55':'#00e87a33'}`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:11,color:user.isAdmin?'#b040ff':'#00e87a'}}>{user.isAdmin?'⬡':(user.name||user.username).substring(0,2).toUpperCase()}</div>
          <button onClick={()=>setUser(null)} style={{background:'none',border:'1px solid #1a1a2e',borderRadius:6,color:'#3a3a60',padding:'4px 8px',fontSize:11}}>↩</button>
        </div>
      </div>
    </div>

    {/* TABS */}
    <div style={{borderBottom:'1px solid #131328',padding:'0 16px',display:'flex',maxWidth:1132,margin:'0 auto',overflowX:'auto'}}>
      {[["markets","◈ Markets"],["portfolio","◉ Portfolio"],["leaderboard","⬆ Leaders"],["resolved","✓ Resolved"],...(user.isAdmin?[["admin","⬡ Admin"]]:[])].map(([k,l])=>(
        <button key={k} className={`tab${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
      ))}
    </div>

    <div style={{maxWidth:1100,margin:'0 auto',padding:'18px 16px'}}>

      {/* MARKETS */}
      {tab==="markets"&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {CATS.map(c=><button key={c} className={`filter-btn${cat===c?" active":""}`} onClick={()=>setCat(c)}>{c}</button>)}
          </div>
          <div style={{display:'flex',gap:6}}>
            <button className="create-btn" onClick={()=>setShowCreate(true)}>+ Create</button>
            <button className="gen-btn" disabled={generating} onClick={aiGenerate}>
              {generating?<span style={{animation:'pulse 1s infinite'}}>◌ …</span>:"⚡ AI Generate"}
            </button>
          </div>
        </div>
        {filtered.length===0?<div style={{color:'#2a2a48',textAlign:'center',padding:'60px 0',fontSize:14}}>No markets — create one or hit AI Generate!</div>:
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(min(280px,100%),1fr))',gap:12,gridAutoRows:'auto'}}>
          {filtered.map(m=>{
            const np=100-m.yp;const pos=positions[m.id];
            return<div key={m.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <Badge cat={m.category}/>
                <span style={{color:'#252540',fontFamily:'DM Mono',fontSize:10}}>{m.close}</span>
              </div>
              <p style={{color:'#ddddf0',fontSize:12,lineHeight:1.5,marginBottom:6,fontWeight:600,minHeight:36}}>{m.title}</p>
              {m.history&&m.history.length>1&&<div style={{marginBottom:8,cursor:'pointer'}} onClick={()=>setChartModal(m)} title="View full chart">
                <Sparkline data={m.history} color="#00e87a"/>
              </div>}
              <div style={{height:3,background:'#1a0810',borderRadius:2,marginBottom:7,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${m.yp}%`,background:'linear-gradient(90deg,#00e87a,#00c060)',borderRadius:2,transition:'width .4s ease'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',gap:10}}>
                  <span style={{color:'#00e87a',fontFamily:'DM Mono',fontSize:12,fontWeight:500}}>YES {m.yp}¢</span>
                  <span style={{color:'#ff3355',fontFamily:'DM Mono',fontSize:12,fontWeight:500}}>NO {np}¢</span>
                </div>
                <span style={{color:'#252540',fontFamily:'DM Mono',fontSize:10}}>Vol {fmt(m.vol)}</span>
              </div>
              {pos&&<div style={{background:'#071510',border:'1px solid #00e87a22',borderRadius:6,padding:'5px 10px',marginBottom:8,display:'flex',justifyContent:'space-between',fontSize:11}}>
                <span style={{color:'#3a6050'}}>My position:</span>
                <span style={{fontFamily:'DM Mono',color:pos.side==='YES'?'#00e87a':'#ff3355'}}>{pos.side} · {pos.shares.toFixed(1)} shares</span>
              </div>}
              <div style={{display:'flex',gap:5}}>
                <button className="yes-btn" onClick={()=>openBet(m,'YES')}>YES</button>
                <button className="no-btn" onClick={()=>openBet(m,'NO')}>NO</button>
                <button className="resolve-btn" onClick={()=>resolveMarket(m)} disabled={resolvingId===m.id} title="AI Resolve">
                  {resolvingId===m.id?<span style={{animation:'pulse 1s infinite'}}>…</span>:"⚡"}
                </button>
                <button className="resolve-btn" onClick={()=>setChartModal(m)} title="View chart" style={{color:'#00e87a55',borderColor:'#00e87a22'}}>▲</button>
              </div>
            </div>;
          })}
          {/* Fill last row so grid is always even */}
          {Array.from({length:(3-(filtered.length%3))%3}).map((_,i)=>(
            <div key={`ph-${i}`} style={{visibility:'hidden',pointerEvents:'none',minHeight:1,borderRadius:12}}/>
          ))}
        </div>}
      </>}

      {/* PORTFOLIO */}
      {tab==="portfolio"&&<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:18}}>
          {[['BALANCE',`$${user.balance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`,'#ddddf0'],['OPEN BETS',myPos.length,'#ddddf0'],['TOTAL BETS',user.bets||0,'#ddddf0'],['WINS',user.wins||0,'#00e87a'],['INVESTED',`$${myPos.reduce((s,p)=>s+(p.invested||0),0).toFixed(2)}`,'#f0c040']].map(([l,v,c])=>(
            <div key={l} style={{background:'#0e0e1c',border:'1px solid #1a1a2e',borderRadius:8,padding:'12px',textAlign:'center'}}>
              <div style={{color:'#3a3a60',fontSize:9,letterSpacing:'.1em',marginBottom:4}}>{l}</div>
              <div style={{fontFamily:'DM Mono',fontSize:14,fontWeight:500,color:c}}>{v}</div>
            </div>
          ))}
        </div>
        {myPos.length===0?<div style={{color:'#2a2a48',textAlign:'center',padding:'60px 0',fontSize:14}}>No open positions yet.</div>:
        myPos.map(p=><div key={p.market.id} className="card" style={{marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{marginBottom:6}}><Badge cat={p.market.category}/></div>
            <p style={{fontSize:12,lineHeight:1.5,marginBottom:8,fontWeight:600}}>{p.market.title}</p>
            <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
              {[['SIDE',<span style={{color:p.side==='YES'?'#00e87a':'#ff3355',fontFamily:'DM Mono',fontWeight:500,fontSize:13}}>{p.side}</span>],['SHARES',<span style={{fontFamily:'DM Mono',fontSize:13}}>{p.shares.toFixed(1)}</span>],['AVG',<span style={{fontFamily:'DM Mono',fontSize:13}}>{p.avgPrice.toFixed(0)}¢</span>],['IN',<span style={{fontFamily:'DM Mono',fontSize:13,color:'#f0c040'}}>${(p.invested||0).toFixed(2)}</span>]].map(([lbl,val])=><div key={lbl}><div style={{color:'#3a3a60',fontSize:9,letterSpacing:'.08em',marginBottom:2}}>{lbl}</div>{val}</div>)}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{color:'#3a3a60',fontSize:9,letterSpacing:'.1em',marginBottom:2}}>CURRENT</div>
            <div style={{fontFamily:'DM Mono',fontSize:17,fontWeight:500,color:p.side==='YES'?'#00e87a':'#ff3355'}}>{p.side==='YES'?p.market.yp:100-p.market.yp}¢</div>
            <div style={{fontFamily:'DM Mono',fontSize:11,color:p.side==='YES'?(p.market.yp>p.avgPrice?'#00e87a':'#ff3355'):(100-p.market.yp>p.avgPrice?'#00e87a':'#ff3355')}}>{(((p.side==='YES'?p.market.yp:100-p.market.yp)-p.avgPrice)/p.avgPrice*100).toFixed(1)}%</div>
          </div>
        </div>)}
      </>}

      {/* LEADERBOARD */}
      {tab==="leaderboard"&&<Leaderboard currentUser={user}/>}

      {/* RESOLVED */}
      {tab==="resolved"&&<>
        {resolvedList.length===0?<div style={{color:'#2a2a48',textAlign:'center',padding:'60px 0',fontSize:14}}>No resolved markets yet — hit ⚡ on any market!</div>:
        resolvedList.map(m=>{
          const res=resolved[m.id];if(!res) return null;
          const oc=res.outcome;
          const oclr=oc==='YES'?'#00e87a':oc==='NO'?'#ff3355':'#f0c040';
          const ocbg=oc==='YES'?'#071510':oc==='NO'?'#150710':'#120e00';
          return<div key={m.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <Badge cat={m.category}/>
              <span style={{color:oclr,background:ocbg,border:`1px solid ${oclr}44`,padding:'3px 10px',borderRadius:4,fontFamily:'DM Mono',fontWeight:500,fontSize:11}}>{oc} · {res.confidence}</span>
            </div>
            <p style={{fontSize:12,lineHeight:1.5,fontWeight:600,marginBottom:8}}>{m.title}</p>
            <p style={{color:'#5a5a80',fontSize:11,lineHeight:1.6,borderLeft:'2px solid #1a1a2e',paddingLeft:10}}>{res.reasoning}</p>
          </div>;
        })}
      </>}
    </div>

    {/* BET MODAL */}
    {betModal&&<div className="modal-overlay" onClick={()=>setBetModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontWeight:700,fontSize:16}}>Place Bet</span>
          <button onClick={()=>setBetModal(null)} style={{background:'none',border:'none',color:'#4a4a6a',fontSize:18}}>✕</button>
        </div>
        <p style={{color:'#5a5a80',fontSize:12,lineHeight:1.5,marginBottom:14}}>{betModal.title}</p>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['YES','NO'].map(s=>{const price=s==='YES'?betModal.yp:100-betModal.yp;const active=betSide===s;const clr=s==='YES'?'#00e87a':'#ff3355';const abg=s==='YES'?'#071510':'#150710';return<button key={s} onClick={()=>setBetSide(s)} style={{flex:1,padding:'10px 8px',borderRadius:8,border:`2px solid ${active?clr:`${clr}33`}`,background:active?abg:'transparent',color:clr,fontFamily:'DM Mono',fontWeight:500,fontSize:14,transition:'all .15s'}}>{s} · {price}¢</button>;})}
        </div>
        <label className="field-label">AMOUNT ($)</label>
        <input type="number" className="bet-input" value={betAmt} onChange={e=>setBetAmt(e.target.value)} placeholder="0" style={{marginBottom:8}}/>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {[10,25,50,100,250].map(a=><button key={a} className="quick" onClick={()=>setBetAmt(String(Math.min(a,user.balance)))}>${a}</button>)}
        </div>
        {parseFloat(betAmt)>0&&<div style={{background:'#07070f',border:'1px solid #131328',borderRadius:8,padding:'10px 14px',marginBottom:14}}>
          {[['Shares',(parseFloat(betAmt)/((betSide==='YES'?betModal.yp:100-betModal.yp)/100)).toFixed(1)],['Payout if correct',`$${(parseFloat(betAmt)/((betSide==='YES'?betModal.yp:100-betModal.yp)/100)).toFixed(2)}`],['Balance after',`$${Math.max(0,user.balance-parseFloat(betAmt)).toFixed(2)}`]].map(([l,v])=><div key={l} style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}><span style={{color:'#4a4a6a'}}>{l}</span><span style={{fontFamily:'DM Mono'}}>{v}</span></div>)}
        </div>}
        <button className={betSide==='YES'?'confirm-yes':'confirm-no'} onClick={placeBet}>Confirm · {betSide}</button>
      </div>
    </div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>
